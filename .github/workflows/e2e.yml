name: E2E (Playwright)

# Runs the standalone e2e/ suite against DEPLOYED apps (hosted prod by default).
#   - workflow_dispatch: run any project on demand.
#   - workflow_call: reusable from other workflows (the promotion pipeline in
#     agentkit-hosting embeds its own steps for tailnet/gamma runs; this callable
#     covers plain prod-reachable runs).
# Note: gamma (tailnet) targets are NOT reachable from GitHub-hosted runners
# without joining the tailnet — the hosting repo's pipeline handles that.
on:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project (smoke | authed | cuj | prod-cuj | canary)"
        default: smoke
      profile_url:
        description: Profile base URL
        default: https://profile.agentkitproject.com
      market_url:
        description: Market base URL
        default: https://market.agentkitproject.com
      forge_url:
        description: Forge base URL
        default: https://forge.agentkitproject.com
      auto_url:
        description: Auto base URL
        default: https://auto.agentkitproject.com
      auth_url:
        description: Keycloak base URL
        default: https://auth.agentkitproject.com
  workflow_call:
    inputs:
      project: { type: string, required: false, default: smoke }
      profile_url: { type: string, required: false, default: https://profile.agentkitproject.com }
      market_url: { type: string, required: false, default: https://market.agentkitproject.com }
      forge_url: { type: string, required: false, default: https://forge.agentkitproject.com }
      auto_url: { type: string, required: false, default: https://auto.agentkitproject.com }
      auth_url: { type: string, required: false, default: https://auth.agentkitproject.com }
    secrets:
      E2E_USER:
        required: false
      E2E_PASSWORD:
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    env:
      E2E_PROFILE_URL: ${{ inputs.profile_url }}
      E2E_MARKET_URL: ${{ inputs.market_url }}
      E2E_FORGE_URL: ${{ inputs.forge_url }}
      E2E_AUTO_URL: ${{ inputs.auto_url }}
      E2E_AUTH_URL: ${{ inputs.auth_url }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=${{ inputs.project }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
