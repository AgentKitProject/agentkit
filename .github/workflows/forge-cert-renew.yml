name: forge-cert-renew

# Renew + rotate the CUSTOM TLS certificate for forge.agentkitproject.com that
# the DigitalOcean CDN (forge-release-hosting) serves. The CI version of
# agentkitproject-doks-infra/scripts/issue-forge-cert.sh.
#
# WHY: we don't use DO-managed Let's Encrypt (its DNS delegation breaks the
# Spaces-CDN routing). Instead we issue a real LE cert via acme.sh DNS-01
# against Route53 and upload it to DO as a `custom` cert. DO certs are
# IMMUTABLE, so rotation = issue a fresh cert under a timestamped name, repoint
# the CDN to it, delete the old one.
#
# ---------------------------------------------------------------------------
# Required GitHub SECRETS:
#   AWS_ACCESS_KEY_ID       Route53 perms for the acme.sh DNS-01 challenge
#   AWS_SECRET_ACCESS_KEY   (route53:ChangeResourceRecordSets + ListHostedZones*
#                            on the agentkitproject.com zone)
#   DIGITALOCEAN_TOKEN      doctl auth (create/list/delete certs, update CDN)
#
# Required GitHub VARS:
#   FORGE_CDN_ID            ID of digitalocean_cdn.primary (from the tofu output
#                           primary_cdn_id). Without it the cert is uploaded but
#                           the CDN is not repointed.
#   FORGE_CERT_NAME         (optional) stable cert name; default
#                           forge-agentkitproject-com
#   FORGE_CERT_DOMAIN       (optional) default forge.agentkitproject.com
# ---------------------------------------------------------------------------

on:
  schedule:
    # ~every 60 days. LE certs last 90 days; 60-day cadence leaves a 30-day
    # buffer. (GitHub cron has no "every 60 days", so run on the 1st of
    # alternating months.)
    - cron: "0 6 1 1,3,5,7,9,11 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-issue even if the current cert is not near expiry"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forge-cert-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    env:
      DOMAIN: ${{ vars.FORGE_CERT_DOMAIN || 'forge.agentkitproject.com' }}
      DESIRED_CERT_NAME: ${{ vars.FORGE_CERT_NAME || 'forge-agentkitproject-com' }}
      CDN_ID: ${{ vars.FORGE_CDN_ID }}
      ACME_EMAIL: jacob.grant@billboard-project.com
      # Route53 DNS-01 (acme.sh dns_aws reads these from the env).
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      # doctl auth.
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      ACME_FORCE: ${{ inputs.force && '1' || '' }}
    steps:
      - name: Preflight
        run: |
          for v in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY DIGITALOCEAN_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done
          if [ -z "$CDN_ID" ]; then
            echo "::warning::FORGE_CDN_ID var is unset — the new cert will be uploaded but the CDN will NOT be repointed automatically."
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Install acme.sh
        run: |
          curl -fsSL https://get.acme.sh | sh -s "email=$ACME_EMAIL"

      - name: Issue cert (DNS-01 / Route53)
        run: |
          ~/.acme.sh/acme.sh --set-default-ca --server letsencrypt || true
          set +e
          ~/.acme.sh/acme.sh --issue --dns dns_aws -d "$DOMAIN" --keylength 2048 ${ACME_FORCE:+--force}
          rc=$?
          set -e
          # rc 2 = not due for renewal (still valid) — acceptable.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "::error::acme.sh issuance failed (rc=$rc)"; exit "$rc"
          fi

          mkdir -p cert
          ~/.acme.sh/acme.sh --install-cert -d "$DOMAIN" \
            --cert-file cert/cert.pem \
            --key-file cert/key.pem \
            --ca-file cert/chain.pem \
            --fullchain-file cert/fullchain.pem

      - name: Upload + rotate DO custom cert, repoint CDN
        run: |
          existing_id() {
            doctl compute certificate list --format ID,Name --no-header \
              | awk -v n="$1" '$2==n{print $1}'
          }

          OLD_ID="$(existing_id "$DESIRED_CERT_NAME" || true)"
          if [ -z "$OLD_ID" ]; then
            UPLOAD_NAME="$DESIRED_CERT_NAME"
          else
            UPLOAD_NAME="${DESIRED_CERT_NAME}-$(date -u +%Y%m%d%H%M%S)"
          fi

          echo "Creating DO custom certificate: $UPLOAD_NAME"
          NEW_ID="$(doctl compute certificate create \
            --type custom \
            --name "$UPLOAD_NAME" \
            --leaf-certificate-path cert/cert.pem \
            --private-key-path cert/key.pem \
            --certificate-chain-path cert/chain.pem \
            --format ID --no-header)"
          echo "Created cert id=$NEW_ID name=$UPLOAD_NAME"

          if [ -n "$CDN_ID" ]; then
            echo "Repointing CDN $CDN_ID -> $UPLOAD_NAME"
            doctl compute cdn update "$CDN_ID" --certificate-name "$UPLOAD_NAME"
            doctl compute cdn flush "$CDN_ID" --files /updates/latest.json || true
            if [ -n "$OLD_ID" ] && [ "$OLD_ID" != "$NEW_ID" ]; then
              echo "Deleting superseded cert $OLD_ID"
              doctl compute certificate delete "$OLD_ID" --force \
                || echo "::warning::could not delete old cert $OLD_ID; delete manually after verifying."
            fi
          else
            echo "::warning::FORGE_CDN_ID unset; uploaded $UPLOAD_NAME but did not repoint a CDN."
          fi

          {
            echo "Issued + uploaded cert: $UPLOAD_NAME (id=$NEW_ID)"
            [ -n "$CDN_ID" ] && echo "CDN $CDN_ID repointed to $UPLOAD_NAME"
          } >> "$GITHUB_STEP_SUMMARY"
