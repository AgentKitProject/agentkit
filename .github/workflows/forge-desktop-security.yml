name: forge-desktop-security

# Desktop-Forge dependency security audits (pnpm + RustSec). Re-homed from the
# standalone agentkitforge-app repo into the monorepo. Path-scoped to
# apps/forge-desktop/** so unrelated monorepo changes don't trigger it.
# Covers checks the root ci.yml does NOT: pnpm audit (prod critical) + cargo-audit.
# RustSec accepted-advisory policy lives in apps/forge-desktop/src-tauri/.cargo/audit.toml.

on:
  pull_request:
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-security.yml"
  push:
    branches:
      - main
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-security.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit (pnpm workspace)
    runs-on: ubuntu-latest
    # forge-desktop is a pnpm workspace member (no own package-lock.json), so audit
    # the workspace via pnpm against the root pnpm-lock.yaml. This covers the desktop
    # app's npm deps (plus the rest of the workspace).
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Audit production dependencies for critical vulnerabilities
        run: pnpm audit --prod --audit-level critical

      - name: Report high vulnerabilities
        run: pnpm audit --audit-level high
        continue-on-error: true

  rustsec:
    name: RustSec audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/forge-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          # hashFiles globs are repo-root-relative regardless of working-directory.
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('apps/forge-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit (prebuilt binary)
        # Prebuilt binary instead of `cargo install` — compiling from source is slow and
        # was flaky on the runner (a `ring` download HTTP/2 framing error + segfault).
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        # step-level working-directory is resolved from the repo root, so spell out
        # the full monorepo path (it overrides the job default). cargo-audit auto-loads
        # the accepted-advisory ignore policy from this dir's .cargo/audit.toml, so REAL
        # vulnerabilities still fail; only documented unmaintained/unsound transitive
        # warnings are ignored.
        working-directory: apps/forge-desktop/src-tauri
        run: cargo audit
