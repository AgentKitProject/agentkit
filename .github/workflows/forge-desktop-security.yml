name: forge-desktop-security

# Desktop-Forge dependency security audits (npm + RustSec). Re-homed from the
# standalone agentkitforge-app repo into the monorepo. Path-scoped to
# apps/forge-desktop/** so unrelated monorepo changes don't trigger it.
# Covers checks the root ci.yml does NOT: npm audit (prod critical) + cargo-audit.

on:
  pull_request:
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-security.yml"
  push:
    branches:
      - main
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-security.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        # Monorepo: run npm against the desktop app's own package-lock.json.
        working-directory: apps/forge-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # `cache` path inputs are repo-root-relative (working-directory does not apply).
          cache-dependency-path: apps/forge-desktop/package-lock.json

      - name: Audit production dependencies for critical vulnerabilities
        run: npm audit --audit-level=critical --omit=dev --package-lock-only

      - name: Report high npm vulnerabilities
        run: npm audit --audit-level=high --package-lock-only
        continue-on-error: true

  rustsec:
    name: RustSec audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/forge-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          # hashFiles globs are repo-root-relative regardless of working-directory.
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('apps/forge-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

      - name: Audit Rust dependencies
        # step-level working-directory is resolved from the repo root, so spell out
        # the full monorepo path (it overrides the job default).
        working-directory: apps/forge-desktop/src-tauri
        run: cargo audit
