name: forge-desktop-smoke

# Desktop-Forge cross-platform build smoke test (Windows/macOS/Linux). Re-homed
# from the standalone agentkitforge-app repo. Path-scoped to apps/forge-desktop/**
# so unrelated monorepo changes don't trigger a 3-OS Tauri build. Covers the full
# Tauri + Rust + sidecar build the root ci.yml does NOT run.

on:
  pull_request:
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "apps/forge-desktop/**"
      - ".github/workflows/forge-desktop-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-build-smoke:
    name: Platform build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    defaults:
      run:
        # Monorepo: the desktop app is at apps/forge-desktop. The original repo
        # checked the app out into a ./agentkitforge-app subdir; here it's already
        # a subdir, so run every step from there and check out the whole repo.
        working-directory: apps/forge-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          # pnpm workspace member: install runs at the repo root against the root
          # pnpm-lock.yaml, so cache by pnpm — no per-app cache-dependency-path.
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        # pnpm resolves the WHOLE workspace (incl. forge-desktop's workspace:* deps),
        # so install must run at the repo root, not inside apps/forge-desktop.
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        # forge-desktop depends on @agentkitforge/core + ui (workspace:*); pnpm only
        # LINKS them — build their dist/ (incl. the core CLI) before the desktop build.
        working-directory: .
        run: pnpm turbo run build --filter=@agentkitforge/core --filter=@agentkitforge/ui

      - name: Build backend runtime bundle
        run: pnpm run build:backend

      - name: Verify backend runtime bundle before Tauri build
        run: pnpm run check:backend

      - name: Run checks
        run: pnpm run check

      - name: Build Tauri app
        if: ${{ runner.os != 'macOS' }}
        run: pnpm run build:tauri

      - name: Build Tauri app bundle
        if: ${{ runner.os == 'macOS' }}
        run: pnpm run build:tauri -- --bundles app

      - name: Verify packaged runtime resources
        run: pnpm run check:tauri-sidecar
