name: image-auto-core

# Build + push the FREE/open AgentKitAuto worker image to GHCR (hosted Fargate +
# self-host k8s pull this). Build context is the monorepo ROOT; gateway-core is
# now a workspace package, so no sibling-repo checkout is needed.

on:
  push:
    branches: [main]
    paths:
      - "packages/auto-core/**"
      - "packages/gateway-core/**"
      - "packages/contracts/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/image-auto-core.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: homelab-agentkit-linux-docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-compilation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentkitauto-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/auto-core/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
