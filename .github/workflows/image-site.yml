name: image-site

# Build + push the apex agentkitproject.com static site image to GHCR.
# Build context is the monorepo ROOT (the Astro site depends on the
# @agentkitforge/ui workspace package); the Dockerfile lives in the package dir
# and bakes apps/site/dist into nginx. Triggered only when this app, the shared
# UI package, or this workflow changes.

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/ui/**"
      - ".github/workflows/image-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    # GitHub-hosted runner (not the self-hosted homelab runner) for image builds.
    runs-on: homelab-agentkit-linux-docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-compilation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentkitproject-site
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/site/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
