name: site-deploy

# Build apps/site (Astro) and publish to the live agentkitproject.com static
# site (AWS S3 + CloudFront). OIDC → AgentKitProjectGitHubDeployRole. Mirrors the
# old agentkitproject-site deploy, adapted for the pnpm monorepo.

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/ui/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: site-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build site (+ workspace deps)
        run: pnpm --filter @agentkitproject/site... build

      - name: Verify static output
        run: test -d apps/site/dist && test -f apps/site/dist/index.html

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::609086950193:role/AgentKitProjectGitHubDeployRole
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync apps/site/dist/ s3://agentkitprojecthostingstack-sitebucket397a1860-fux9rw5jz1gy/ --delete

      - name: CloudFront invalidation
        run: |
          ID="$(aws cloudfront create-invalidation --distribution-id E1CGNR4ZGEMZ14 --paths '/*' --query Invalidation.Id --output text)"
          aws cloudfront wait invalidation-completed --distribution-id E1CGNR4ZGEMZ14 --id "$ID"
