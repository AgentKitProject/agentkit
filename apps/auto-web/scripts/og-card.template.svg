<!--
  Reusable OG-card template (1200x630) for the AgentKitProject ecosystem.
  Placeholders replaced by scripts/generate-og.mjs:
    {{TITLE}}    — large headline (e.g. "AgentKitMarket")
    {{TAGLINE}}  — one-line subtitle
    {{ACCENT}}   — accent hex (per-app brand color)
  Brand-consistent placeholder card; mirrors apps/site/scripts/og-card.template.svg.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091227"/>
      <stop offset="1" stop-color="#111b35"/>
    </linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c77f1"/>
      <stop offset="0.5" stop-color="#0fb3d1"/>
      <stop offset="1" stop-color="#6d46e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="10" fill="url(#accentbar)"/>

  <!-- soft accent glow -->
  <circle cx="1040" cy="120" r="320" fill="{{ACCENT}}" opacity="0.14"/>
  <circle cx="120" cy="560" r="240" fill="#2c77f1" opacity="0.10"/>

  <!-- eyebrow -->
  <text x="90" y="240" font-family="Inter, sans-serif" font-size="30" font-weight="800"
        letter-spacing="4" fill="{{ACCENT}}">AGENTKITPROJECT</text>

  <!-- title -->
  <text x="86" y="350" font-family="Inter, sans-serif" font-size="86" font-weight="900"
        fill="#ffffff">{{TITLE}}</text>

  <!-- tagline -->
  <text x="90" y="430" font-family="Inter, sans-serif" font-size="36" font-weight="500"
        fill="#aeb9cc">{{TAGLINE}}</text>

  <!-- footer accent dot row -->
  <circle cx="100" cy="540" r="9" fill="#5b4cf0"/>
  <circle cx="128" cy="540" r="9" fill="#0fb3d1"/>
  <circle cx="156" cy="540" r="9" fill="#16a34a"/>
  <text x="180" y="548" font-family="Inter, sans-serif" font-size="26" font-weight="600"
        fill="#aeb9cc">agentkitproject.com</text>
</svg>
