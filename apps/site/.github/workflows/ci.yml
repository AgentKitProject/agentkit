name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Install, lint, test, and build
    runs-on: homelab-agentkit-linux-general

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
