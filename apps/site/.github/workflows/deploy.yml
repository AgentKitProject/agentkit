name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: agentkitproject-site-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: homelab-agentkit-linux-general
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::609086950193:role/AgentKitProjectGitHubDeployRole
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Verify static output
        run: |
          test -d dist
          test -f dist/roadmap/index.html

      - name: Sync to S3
        run: aws s3 sync dist/ s3://agentkitprojecthostingstack-sitebucket397a1860-fux9rw5jz1gy/ --delete

      - name: Request CloudFront invalidation
        id: invalidate
        run: |
          INVALIDATION_ID="$(aws cloudfront create-invalidation \
            --distribution-id E1CGNR4ZGEMZ14 \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)"
          echo "invalidation_id=$INVALIDATION_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id E1CGNR4ZGEMZ14 \
            --id "${{ steps.invalidate.outputs.invalidation_id }}"

      - name: Smoke check public pages
        continue-on-error: true
        run: |
          getent hosts agentkitproject.com || true
          nslookup agentkitproject.com || true
          dig agentkitproject.com || true

          if ! curl -fsS --retry 10 --retry-delay 10 --retry-connrefused https://agentkitproject.com/ > /dev/null; then
            echo "External smoke test failed from GitHub runner. Deployment already completed; verify locally or rerun workflow."
            exit 0
          fi

          if ! curl -fsS --retry 10 --retry-delay 10 --retry-connrefused https://agentkitproject.com/roadmap > /dev/null; then
            echo "External smoke test failed from GitHub runner. Deployment already completed; verify locally or rerun workflow."
            exit 0
          fi

          if ! curl -fsS --retry 10 --retry-delay 10 --retry-connrefused https://agentkitproject.com/about > /dev/null; then
            echo "External smoke test failed from GitHub runner. Deployment already completed; verify locally or rerun workflow."
            exit 0
          fi

          if ! curl -fsS --retry 10 --retry-delay 10 --retry-connrefused https://agentkitproject.com/docs > /dev/null; then
            echo "External smoke test failed from GitHub runner. Deployment already completed; verify locally or rerun workflow."
            exit 0
          fi
