# ---------------------------------------------------------------------------- #
# apex agentkitproject.com static site — single server block.
#
# The DOKS ingress (ingress-nginx) terminates TLS and forwards apex + www + docs
# to this one backend over plain HTTP, preserving the original Host header. So we
# branch on $host here and redirect to the canonical https apex:
#   - www.agentkitproject.com   -> https://agentkitproject.com$request_uri
#   - docs.agentkitproject.com  -> https://agentkitproject.com/docs$request_uri
# Everything else (the apex itself) is served from the baked static site.
# ---------------------------------------------------------------------------- #

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # k8s liveness/readiness probe — no TLS, no host match needed.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # --- Host-based redirects (use the public https scheme; TLS is at ingress) ---
    if ($host = www.agentkitproject.com) {
        return 301 https://agentkitproject.com$request_uri;
    }
    if ($host = docs.agentkitproject.com) {
        return 301 https://agentkitproject.com/docs$request_uri;
    }

    # Astro directory-index serving (pretty URLs -> <path>/index.html).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Astro emits dist/404.html at the site root.
    error_page 404 /404.html;
}
