{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkit-keycloak.secretName" . }}
  labels:
    {{- include "agentkit-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
data:
  {{- /* Bootstrap admin password (temporary admin created on first boot). */}}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ include "agentkit-keycloak.effectiveAdminPassword" . | b64enc | quote }}
  {{- /* DB password — the bundled Postgres password, or the external db.password. */}}
  KC_DB_PASSWORD: {{ include "agentkit-keycloak.effectiveKcDbPassword" . | b64enc | quote }}
  {{- /*
  Per-app confidential client secrets. The SAME effective values are baked into
  the realm-import JSON, so each app's OIDC_CLIENT_SECRET must equal the value
  here. Read one back with:
    kubectl get secret {{ include "agentkit-keycloak.secretName" . }} \
      -o jsonpath='{.data.CLIENT_SECRET_AGENTKITMARKET}' | base64 -d
  */}}
  {{- range $key, $c := .Values.realm.clients }}
  {{- $appUrl := index $.Values.realm.appUrls $key }}
  {{- if $appUrl }}
  {{ include "agentkit-keycloak.clientSecretKey" $c.clientId }}: {{ include "agentkit-keycloak.effectiveClientSecret" (list $ $c) | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.smtp.enabled }}
  {{- with .Values.smtp.user }}
  SMTP_USER: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.smtp.password }}
  SMTP_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
