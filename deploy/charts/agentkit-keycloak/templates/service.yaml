apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentkit-keycloak.fullname" . }}
  labels:
    {{- include "agentkit-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  selector:
    {{- include "agentkit-keycloak.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
    {{- if .Values.https.enabled }}
    - name: https
      port: {{ .Values.https.servicePort | default .Values.https.port }}
      targetPort: https
    {{- end }}
