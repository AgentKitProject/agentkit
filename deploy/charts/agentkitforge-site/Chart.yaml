apiVersion: v2
name: agentkitforge-site
description: Desktop-Forge download site front door — a tiny nginx reverse proxy that fronts forge.agentkitproject.com via DOKS ingress-nginx, rewrites directory paths to index.html, and proxies to the DigitalOcean Spaces CDN serving the Astro download site + release artifacts + Tauri updater manifest. TLS via cert-manager (HTTP-01, letsencrypt-prod).
type: application
version: 0.4.0
appVersion: "1.27-alpine"
keywords:
  - agentkit
  - forge
  - download
  - release-hosting
home: https://forge.agentkitproject.com
sources:
  - https://github.com/AgentKitProject/agentkit
