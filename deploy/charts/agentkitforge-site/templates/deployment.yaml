apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitforge-site.fullname" . }}
  labels:
    {{- include "agentkitforge-site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "agentkitforge-site.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentkitforge-site.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: conf
          configMap:
            name: {{ include "agentkitforge-site.configmapName" . }}
