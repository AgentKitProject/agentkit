apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentkitforge-site.fullname" . }}
  labels:
    {{- include "agentkitforge-site.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "agentkitforge-site.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
