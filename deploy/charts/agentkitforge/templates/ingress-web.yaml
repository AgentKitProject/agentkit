{{- if and .Values.web.enabled .Values.web.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentkitforge.fullname" . }}
  labels:
    {{- include "agentkitforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with .Values.web.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  {{- if .Values.web.ingress.tls }}
  tls:
    {{- toYaml .Values.web.ingress.tls | nindent 4 }}
  {{- end }}
  {{- $hosts := list }}
  {{- if .Values.web.ingress.host }}{{- $hosts = append $hosts .Values.web.ingress.host }}{{- end }}
  {{- range .Values.web.ingress.extraHosts }}{{- $hosts = append $hosts . }}{{- end }}
  {{- if $hosts }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agentkitforge.fullname" $ }}
                port:
                  name: http
    {{- end }}
  {{- else }}
  # No host → catch-all defaultBackend. Required for tailscale ingress, where the
  # real Host is the full tailnet FQDN; the served name comes from tls.hosts.
  defaultBackend:
    service:
      name: {{ include "agentkitforge.fullname" . }}
      port:
        name: http
  {{- end }}
{{- end }}
