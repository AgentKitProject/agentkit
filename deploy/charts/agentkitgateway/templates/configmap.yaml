apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkitgateway.configmapName" . }}
  labels:
    {{- include "agentkitgateway.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  API_ALLOWED_ORIGINS: {{ .Values.config.allowedOrigins | quote }}
  {{- with .Values.config.markupBps }}
  GATEWAY_MARKUP_BPS: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.defaultModel }}
  GATEWAY_DEFAULT_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.maxTokens }}
  GATEWAY_MAX_TOKENS: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Bucket }}
  S3_BUCKET: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Endpoint }}
  S3_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Region }}
  S3_REGION: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Prefix }}
  S3_PREFIX: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3ForcePathStyle }}
  S3_FORCE_PATH_STYLE: {{ . | quote }}
  {{- end }}
