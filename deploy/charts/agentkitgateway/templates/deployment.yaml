apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitgateway.fullname" . }}
  labels:
    {{- include "agentkitgateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentkitgateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentkitgateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "agentkitgateway.configmapName" . }}
            - secretRef:
                name: {{ include "agentkitgateway.effectiveSecretName" . }}
          {{- /* Optional read-only Postgres CA mount for sslmode=verify-ca.
            DATABASE_URL points sslrootcert at /etc/db-ca/ca-certificate.crt. */}}
          {{- if .Values.database.caSecret }}
          volumeMounts:
            - name: db-ca
              mountPath: /etc/db-ca
              readOnly: true
          {{- end }}
          {{- /* No /health route on the gateway — probe the TCP port instead.
            The server only listens once startup (incl. schema apply under the
            advisory lock) has completed, so a successful TCP connect is a sound
            readiness signal. */}}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- /* Optional read-only Postgres CA mount for sslmode=verify-ca. */}}
      {{- if .Values.database.caSecret }}
      volumes:
        - name: db-ca
          secret:
            secretName: {{ .Values.database.caSecret }}
      {{- end }}
