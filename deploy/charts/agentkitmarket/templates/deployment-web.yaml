{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitmarket.fullname" . }}-web
  labels:
    {{- include "agentkitmarket.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "agentkitmarket.selectorLabelsWeb" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentkitmarket.selectorLabelsWeb" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Optional static /etc/hosts entries for the web pod. Default empty
        (secure default unchanged). Used by the k3s smoke test to resolve the
        ingress nip.io hosts straight to the node IP when the CNI can't hairpin. */}}
      {{- with .Values.web.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command: ["node", "apps/market-web/server.js"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "agentkitmarket.webConfigmapName" . }}
            - secretRef:
                name: {{ include "agentkitmarket.webEffectiveSecretName" . }}
                optional: true
          {{- /* Optional extra env vars merged verbatim into the web container.
            Default empty (secure default unchanged). Used by the k3s smoke test
            to inject NODE_TLS_REJECT_UNAUTHORIZED=0 for self-signed Traefik TLS. */}}
          {{- with .Values.web.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* Probe the always-public /healthz route, NOT /. When
            web.config.requireLogin is set, / redirects to sign-in and a probe on
            / would never see the pod Ready; /healthz is gate-exempt + returns 200. */}}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
{{- end }}
