{{- if .Values.web.enabled -}}
{{- $fullname := include "agentkitprofile.fullname" . -}}
{{- /* Default the Profile API base URL to this web tier's own in-cluster Service
       so the app's outbound service.ts self-calls (profile-api folded into the
       same Next.js app) resolve. */ -}}
{{- $profileApiBaseUrl := .Values.web.config.profileApiBaseUrl -}}
{{- if not $profileApiBaseUrl -}}
  {{- $profileApiBaseUrl = printf "http://%s-web" $fullname -}}
{{- end -}}
{{- $appUrl := .Values.web.config.appUrl -}}
{{- $isOidc := eq .Values.web.authProvider "oidc" -}}
{{- $redirect := .Values.web.config.workosRedirectUri -}}
{{- if and (not $redirect) $appUrl -}}
  {{- $redirect = printf "%s/auth/callback" (trimSuffix "/" $appUrl) -}}
{{- end -}}
{{- $oidc := .Values.web.config.oidc -}}
{{- $oidcRedirect := $oidc.redirectUri -}}
{{- if and (not $oidcRedirect) $appUrl -}}
  {{- $oidcRedirect = printf "%s/auth/callback" (trimSuffix "/" $appUrl) -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkitprofile.webConfigmapName" . }}
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
data:
  NODE_ENV: "production"
  PORT: {{ .Values.web.port | quote }}
  HOSTNAME: "0.0.0.0"
  # Auth provider: "workos" (hosted default) or "oidc" (self-host).
  AUTH_PROVIDER: {{ .Values.web.authProvider | quote }}
  # Profile backend selector — only "postgres" is implemented.
  PROFILE_STORE: {{ .Values.web.config.profileStore | quote }}
  # Profile API base URL — server-side self-call into this same web tier.
  PROFILE_API_BASE_URL: {{ $profileApiBaseUrl | quote }}
  {{- if .Values.web.config.profileDbSsl }}
  # Set to "disable" to turn off Postgres TLS (e.g. local PG without SSL).
  PROFILE_DB_SSL: {{ .Values.web.config.profileDbSsl | quote }}
  {{- end }}
  {{- if $appUrl }}
  APP_URL: {{ $appUrl | quote }}
  NEXT_PUBLIC_APP_URL: {{ $appUrl | quote }}
  {{- end }}
  {{- if .Values.web.config.adminEmails }}
  AGENTKITPROJECT_ADMIN_EMAILS: {{ .Values.web.config.adminEmails | quote }}
  {{- end }}
  {{- if $isOidc }}
  # ---- OIDC (self-host) ----
  {{- with .Values.web.config.oidc.issuer }}
  OIDC_ISSUER: {{ . | quote }}
  {{- end }}
  {{- with .Values.web.config.oidc.clientId }}
  OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.web.config.oidc.scopes }}
  OIDC_SCOPES: {{ . | quote }}
  {{- end }}
  {{- if $oidcRedirect }}
  OIDC_REDIRECT_URI: {{ $oidcRedirect | quote }}
  {{- end }}
  {{- if .Values.web.config.oidc.allowInsecure }}
  OIDC_ALLOW_INSECURE: "true"
  {{- end }}
  {{- else }}
  # ---- WorkOS (hosted default) ----
  {{- if .Values.web.config.workosClientId }}
  # WorkOS client id — public, safe in the ConfigMap.
  WORKOS_CLIENT_ID: {{ .Values.web.config.workosClientId | quote }}
  {{- end }}
  {{- if $redirect }}
  WORKOS_REDIRECT_URI: {{ $redirect | quote }}
  {{- end }}
  {{- end }}
{{- end }}
