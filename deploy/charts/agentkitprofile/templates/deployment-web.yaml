{{- if .Values.web.enabled -}}
{{- $secretName := include "agentkitprofile.webEffectiveSecretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitprofile.fullname" . }}-web
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "agentkitprofile.selectorLabelsWeb" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentkitprofile.selectorLabelsWeb" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Optional static /etc/hosts entries for the web pod. Default empty. */}}
      {{- with .Values.web.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "apps/profile-web/server.js"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "agentkitprofile.webConfigmapName" . }}
            - secretRef:
                name: {{ $secretName }}
                optional: true
          env:
            {{- /*
            Auto-compose DATABASE_URL for the bundled Postgres from the secret's
            POSTGRES_PASSWORD, so the secret only needs the password (not the full
            connection string). Skipped when an explicit web.secrets.databaseUrl is
            supplied (that external DATABASE_URL — present in the secret via envFrom —
            wins) or when bundled postgres is disabled. */}}
            {{- if and .Values.postgres.enabled (not .Values.web.secrets.databaseUrl) }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "agentkitprofile.postgresHost" . }}:5432/{{ .Values.postgres.database }}"
            {{- end }}
            {{- /* Optional extra env vars merged verbatim into the web container. Default empty. */}}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
          {{- if .Values.database.caSecret }}
          volumeMounts:
            - name: db-ca
              mountPath: /etc/db-ca
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
      {{- if .Values.database.caSecret }}
      volumes:
        - name: db-ca
          secret:
            secretName: {{ .Values.database.caSecret }}
      {{- end }}
{{- end }}
