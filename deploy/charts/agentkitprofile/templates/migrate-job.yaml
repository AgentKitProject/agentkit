{{- if and .Values.web.enabled .Values.migrate.enabled -}}
{{- $secretName := include "agentkitprofile.webEffectiveSecretName" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentkitprofile.fullname" . }}-migrate
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the app rolls out, on both install and upgrade. The migration
    # SQL is idempotent (IF NOT EXISTS) and serialized by a pg advisory lock, so
    # re-running is a no-op.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "agentkitprofile.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/profile-web/scripts/migrate.mts"]
          env:
            {{- /*
            DATABASE_URL composed identically to the web Deployment: when bundled
            Postgres is enabled and no explicit web.secrets.databaseUrl is supplied,
            build it from POSTGRES_PASSWORD + the in-cluster Postgres host; otherwise
            read the external DATABASE_URL straight from the (effective) secret. */}}
            {{- if and .Values.postgres.enabled (not .Values.web.secrets.databaseUrl) }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "agentkitprofile.postgresHost" . }}:5432/{{ .Values.postgres.database }}"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DATABASE_URL
            {{- end }}
            {{- if .Values.web.config.profileDbSsl }}
            - name: PROFILE_DB_SSL
              value: {{ .Values.web.config.profileDbSsl | quote }}
            {{- end }}
          {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
          {{- if .Values.database.caSecret }}
          volumeMounts:
            - name: db-ca
              mountPath: /etc/db-ca
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
      {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
      {{- if .Values.database.caSecret }}
      volumes:
        - name: db-ca
          secret:
            secretName: {{ .Values.database.caSecret }}
      {{- end }}
{{- end }}
