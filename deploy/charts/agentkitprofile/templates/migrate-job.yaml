{{- if and .Values.web.enabled .Values.migrate.enabled -}}
{{- $secretName := include "agentkitprofile.webEffectiveSecretName" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentkitprofile.fullname" . }}-migrate
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # POST-sync so the bundled Postgres (a normal sync-phase resource) exists and
    # is healthy before the migration runs — a pre-sync hook would run before the
    # in-cluster DB is created and could never connect. The web probe is DB-free
    # (GET / → sign-in redirect), so web reports healthy and this hook fires; web
    # serves real requests once the schema lands. Migration SQL is idempotent
    # (IF NOT EXISTS) + advisory-locked, so re-running on upgrade is a no-op.
    # (External DATABASE_URL deployments: the DB is already up, so post is fine.)
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "agentkitprofile.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      {{- if and .Values.postgres.enabled (not .Values.web.secrets.databaseUrl) }}
      # Wait for the bundled Postgres to accept connections before migrating
      # (post-sync runs after it's healthy, but guard the brief readiness window).
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image | quote }}
          command:
            - sh
            - -c
            - 'until pg_isready -h {{ include "agentkitprofile.postgresHost" . }} -p 5432 -U {{ .Values.postgres.user }}; do echo "waiting for postgres"; sleep 2; done'
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/profile-web/scripts/migrate.mts"]
          env:
            {{- /*
            DATABASE_URL composed identically to the web Deployment: when bundled
            Postgres is enabled and no explicit web.secrets.databaseUrl is supplied,
            build it from POSTGRES_PASSWORD + the in-cluster Postgres host; otherwise
            read the external DATABASE_URL straight from the (effective) secret. */}}
            {{- if and .Values.postgres.enabled (not .Values.web.secrets.databaseUrl) }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "agentkitprofile.postgresHost" . }}:5432/{{ .Values.postgres.database }}"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DATABASE_URL
            {{- end }}
            {{- if .Values.web.config.profileDbSsl }}
            - name: PROFILE_DB_SSL
              value: {{ .Values.web.config.profileDbSsl | quote }}
            {{- end }}
          {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
          {{- if .Values.database.caSecret }}
          volumeMounts:
            - name: db-ca
              mountPath: /etc/db-ca
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
      {{- /* Optional read-only Postgres CA mount for sslmode=verify-full. */}}
      {{- if .Values.database.caSecret }}
      volumes:
        - name: db-ca
          secret:
            secretName: {{ .Values.database.caSecret }}
      {{- end }}
{{- end }}
