{{- if and .Values.web.enabled .Values.migrate.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentkitprofile.fullname" . }}-migrate
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the app rolls out, on both install and upgrade. The migration
    # SQL is idempotent (IF NOT EXISTS) and serialized by a pg advisory lock, so
    # re-running is a no-op.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "agentkitprofile.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "scripts/migrate.mts"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentkitprofile.webEffectiveSecretName" . }}
                  key: DATABASE_URL
            {{- if .Values.web.config.profileDbSsl }}
            - name: PROFILE_DB_SSL
              value: {{ .Values.web.config.profileDbSsl | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
