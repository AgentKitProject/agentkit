{{- if and .Values.web.enabled (not .Values.web.secrets.existingSecret) -}}
{{- $isOidc := eq .Values.web.authProvider "oidc" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitprofile.webSecretName" . }}
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
data:
  {{- /*
  DATABASE_URL — the external/managed Postgres connection string. There is no
  bundled Postgres, so this MUST be supplied (web.secrets.databaseUrl) or via an
  existingSecret. Emitted only when set so the chart renders cleanly before it is
  wired; the deployment + migrate Job require it at runtime.
  */}}
  {{- with .Values.web.secrets.databaseUrl }}
  DATABASE_URL: {{ . | b64enc | quote }}
  {{- end }}
  {{- /*
  POSTGRES_PASSWORD — only emitted when bundled Postgres is enabled. The bundled
  Postgres + the web/migrate tiers read it from here and compose DATABASE_URL at
  runtime, so the operator never supplies a full connection string for the bundled
  DB. Auto-generated + persisted when left empty.
  */}}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ include "agentkitprofile.effectivePostgresPassword" . | b64enc | quote }}
  {{- end }}
  {{- /*
  PROFILE_SERVICE_KEY — shared bearer the Market server presents to the
  profile-api. Auto-generated + persisted when left empty.
  */}}
  PROFILE_SERVICE_KEY: {{ include "agentkitprofile.effectiveProfileServiceKey" . | b64enc | quote }}
  {{- /*
  PROFILE_KEY_ENCRYPTION_SECRET — AES-256-GCM at-rest key for org shared LLM
  provider keys (mirrors Market's MARKET_KEY_ENCRYPTION_SECRET). Auto-generated +
  persisted when left empty. If absent at runtime the app stores keys in PLAINTEXT
  with a one-time warning; the chart always mints one so encryption is the default.
  */}}
  PROFILE_KEY_ENCRYPTION_SECRET: {{ include "agentkitprofile.effectiveKeyEncryptionSecret" . | b64enc | quote }}
  {{- if $isOidc }}
  {{- /*
  OIDC (self-host). The client secret is required for the authorization-code
  flow; SESSION_SECRET signs the iron-session cookie and is auto-generated +
  persisted when not supplied.
  */}}
  {{- with .Values.web.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ . | b64enc | quote }}
  {{- end }}
  SESSION_SECRET: {{ include "agentkitprofile.effectiveSessionSecret" . | b64enc | quote }}
  {{- else }}
  {{- /*
  WorkOS AuthKit secrets — required for sign-in / account management; emitted
  only when set so the chart renders cleanly before WorkOS is wired.
  */}}
  {{- with .Values.web.secrets.workosApiKey }}
  WORKOS_API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosCookiePassword }}
  WORKOS_COOKIE_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
