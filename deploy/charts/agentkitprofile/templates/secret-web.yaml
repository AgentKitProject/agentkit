{{- if and .Values.web.enabled (not .Values.web.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitprofile.webSecretName" . }}
  labels:
    {{- include "agentkitprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
data:
  {{- /*
  DATABASE_URL — the external/managed Postgres connection string. There is no
  bundled Postgres, so this MUST be supplied (web.secrets.databaseUrl) or via an
  existingSecret. Emitted only when set so the chart renders cleanly before it is
  wired; the deployment + migrate Job require it at runtime.
  */}}
  {{- with .Values.web.secrets.databaseUrl }}
  DATABASE_URL: {{ . | b64enc | quote }}
  {{- end }}
  {{- /*
  PROFILE_SERVICE_KEY — shared bearer the Market server presents to the
  profile-api. Auto-generated + persisted when left empty.
  */}}
  PROFILE_SERVICE_KEY: {{ include "agentkitprofile.effectiveProfileServiceKey" . | b64enc | quote }}
  {{- /*
  WorkOS AuthKit secrets — required for sign-in / account management; emitted
  only when set so the chart renders cleanly before WorkOS is wired.
  */}}
  {{- with .Values.web.secrets.workosApiKey }}
  WORKOS_API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosCookiePassword }}
  WORKOS_COOKIE_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
{{- end }}
